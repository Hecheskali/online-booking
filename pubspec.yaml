name: online_booking
description: "A premium bus ticket booking application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  google_sign_in: ^6.2.2
  
  # Notifications & Offline Alarms
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  file_picker: ^8.1.7
  
  # State Management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.6.0
  
  # Networking & API
  dio: ^5.7.0
  retrofit: ^4.4.1
  url_launcher: ^6.3.1
  
  # UI & UX
  google_maps_flutter: ^2.10.0
  flutter_polyline_points: ^2.1.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  qr_flutter: ^4.1.0
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  permission_handler: ^11.3.1
  gal: ^2.3.2
  
  # Security & Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.2
  
  # Local Storage & Utils
  shared_preferences: ^2.3.5
  geolocator: ^13.0.2
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutterwave_standard: ^1.1.0
  firebase_messaging: ^15.2.10
  firebase_in_app_messaging: ^0.8.1+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  retrofit_generator: ^9.1.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icons"
  ios: true
  images_path: "assets/icon/app_icon.png"  
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/vectors/
